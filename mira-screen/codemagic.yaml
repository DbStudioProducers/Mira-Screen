# ================================================
# Mira Screen - Mac Mini M2 + Android Fixed
# Final configuration with complete Android support
# ================================================

workflows:
  mira-screen-m2-android-fixed:
    name: Mira Screen - Mac Mini M2 (Android + iOS)
    max_build_duration: 120

    instance_type: mac_mini_m2
    environment:
      flutter: 3.24.0
      xcode: latest

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches

    scripts:
      - name: Enter client directory
        script: |
          cd client

      - name: Regenerate iOS and Android projects
        script: |
          cd client
          rm -rf ios android
          flutter create --platforms=ios,android . \
            --project-name mira_screen \
            --org com.mirascreen

      - name: Install dependencies
        script: |
          cd client
          flutter clean
          flutter pub get

      - name: Build Android APK (Release)
        script: |
          cd client
          flutter build apk --release

      - name: Build iOS IPA (M2)
        script: |
          cd client
          flutter build ipa --release \
            --no-codesign \
            --export-options-plist=ios/ExportOptions.plist || true

    artifacts:
      - client/build/app/outputs/flutter-apk/app-release.apk
      - client/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - admin@mirascreen.com
        notify:
          success: true
          failure: true