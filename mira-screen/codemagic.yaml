# ================================================
# Mira Screen - FINAL & ROBUST Codemagic Configuration
# Optimized for speed + reliability
# Includes dependency caching and explicit builds
# ================================================

workflows:
  mira-screen-production:
    name: Mira Screen - Production Build (iOS + Android)
    max_build_duration: 120

    environment:
      flutter: 3.24.0
      groups:
        - appstore_credentials

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.android/build-cache

    scripts:
      # ============================================
      # STEP 1: Navigate and prepare
      # ============================================
      - name: Prepare Flutter project
        script: |
          cd client
          echo "Working directory: $(pwd)"
          flutter doctor -v

      # ============================================
      # STEP 2: Generate platforms (Critical Fix)
      # ============================================
      - name: Generate iOS and Android folders
        script: |
          cd client
          echo "=== Generating platforms ==="
          flutter create --platforms=ios,android . --project-name mira_screen
          echo "=== Platforms ready ==="

      # ============================================
      # STEP 3: Clean + Dependencies
      # ============================================
      - name: Clean and install dependencies
        script: |
          cd client
          flutter clean
          flutter pub get

      # ============================================
      # STEP 4: Build Android (Release)
      # ============================================
      - name: Build Android APK (Release)
        script: |
          cd client
          flutter build apk --release --verbose

      # ============================================
      # STEP 5: Build iOS (Release)
      # ============================================
      - name: Build iOS IPA (Release)
        script: |
          cd client
          flutter build ipa --release --no-codesign --verbose || true

    artifacts:
      - client/build/app/outputs/flutter-apk/app-release.apk
      - client/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - admin@mirascreen.com
        notify:
          success: true
          failure: true

  # Optional: Debug build workflow
  mira-screen-debug:
    name: Mira Screen - Debug Build
    max_build_duration: 90

    environment:
      flutter: 3.24.0

    scripts:
      - name: Generate platforms
        script: |
          cd client
          flutter create --platforms=ios,android .

      - name: Build Android Debug
        script: |
          cd client
          flutter build apk --debug

      - name: Build iOS Debug
        script: |
          cd client
          flutter build ios --debug --no-codesign || true

    artifacts:
      - client/build/app/outputs/flutter-apk/app-debug.apk