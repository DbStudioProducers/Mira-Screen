# ================================================
# Mira Screen - Mac Mini M2 Optimized Configuration
# Optimized for Apple Silicon (M1/M2)
# ================================================

workflows:
  mira-screen-m2:
    name: Mira Screen - Mac Mini M2 Build
    max_build_duration: 120

    # Force Mac Mini M2 runner (Apple Silicon)
    instance_type: mac_mini_m2

    environment:
      flutter: 3.24.0
      xcode: latest
      groups:
        - appstore_credentials

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches

    scripts:
      # 1. Navigate to client
      - name: Enter Flutter project
        script: |
          cd client
          echo "Running on: $(uname -m)"

      # 2. Regenerate iOS project (ensures M2 compatibility)
      - name: Regenerate iOS and Android projects
        script: |
          cd client
          rm -rf ios
          flutter create --platforms=ios,android . \
            --project-name mira_screen \
            --org com.mirascreen \
            --platforms=ios,android

      # 3. Dependencies
      - name: Install dependencies
        script: |
          cd client
          flutter clean
          flutter pub get

      # 4. Build Android (arm64 + x86_64)
      - name: Build Android APK
        script: |
          cd client
          flutter build apk --release

      # 5. Build iOS for Apple Silicon (M2)
      - name: Build iOS IPA (M2 optimized)
        script: |
          cd client
          flutter build ipa --release \
            --no-codesign \
            --export-options-plist=ios/ExportOptions.plist || true

    artifacts:
      - client/build/app/outputs/flutter-apk/app-release.apk
      - client/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - admin@mirascreen.com
        notify:
          success: true
          failure: true