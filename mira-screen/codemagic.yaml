# =============================================
# Mira Screen - Codemagic Configuration
# Build Flutter app (iOS + Android) completely in the cloud
# No local installation required
# =============================================

workflows:
  build-mira-screen:
    name: Mira Screen - Full Build (iOS + Android)
    max_build_duration: 75

    environment:
      flutter: 3.24.0
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: com.mirascreen.app
        APP_NAME: "Mira Screen"

    scripts:
      # 1. Go to client folder
      - name: Navigate to Flutter project
        script: |
          cd client

      # 2. CRITICAL: Generate iOS and Android folders (fixes "Did not find xcodeproj")
      - name: Generate iOS & Android platforms
        script: |
          cd client
          echo "Generating iOS and Android folders..."
          flutter create --platforms=ios,android .
          echo "Platforms generated successfully!"

      # 3. Get dependencies
      - name: Install Flutter dependencies
        script: |
          cd client
          flutter pub get

      # 4. Build Android
      - name: Build Android APK (Release)
        script: |
          cd client
          flutter build apk --release

      # 5. Build iOS
      - name: Build iOS IPA (Release)
        script: |
          cd client
          flutter build ipa --release --no-codesign || true

    artifacts:
      - client/build/app/outputs/flutter-apk/app-release.apk
      - client/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - admin@mirascreen.com
        notify:
          success: true
          failure: true

      # Optional: Publish to Google Play / App Store later
      # google_play:
      #   credentials: $GCLOUD_KEY
      # app_store:
      #   apple_id: $APPLE_ID
      #   password: $APPLE_PASSWORD