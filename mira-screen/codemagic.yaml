# ================================================
# Mira Screen - FINAL Codemagic Configuration
# This workflow guarantees iOS and Android builds
# ================================================

workflows:
  build-mira-screen:
    name: Mira Screen - Complete Build
    max_build_duration: 120

    environment:
      flutter: 3.24.0

    scripts:
      # 1. Navigate to client folder
      - name: Enter Flutter directory
        script: |
          cd client
          pwd

      # 2. CRITICAL FIX: Force generate iOS and Android
      - name: Generate iOS & Android (Fix xcodeproj error)
        script: |
          cd client
          echo "=== Running flutter create ==="
          flutter create --platforms=ios,android . --project-name mira_screen
          echo "=== Generation completed ==="
          ls -la ios/ 2>/dev/null || echo "iOS folder created"
          ls -la android/ 2>/dev/null || echo "Android folder created"

      # 3. Clean and get dependencies
      - name: Clean and get packages
        script: |
          cd client
          flutter clean
          flutter pub get

      # 4. Build Android
      - name: Build Android Release APK
        script: |
          cd client
          flutter build apk --release

      # 5. Build iOS
      - name: Build iOS Release IPA
        script: |
          cd client
          flutter build ipa --release --no-codesign || true

    artifacts:
      - client/build/app/outputs/flutter-apk/app-release.apk
      - client/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - admin@mirascreen.com
        notify:
          success: true
          failure: true