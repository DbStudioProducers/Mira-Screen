<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Mira Player • Custom</title>
  <link href="https://unpkg.com/video.js/dist/video-js.min.css" rel="stylesheet">
</head>
<body style="background:#000; color:white; font-family:sans-serif; padding:40px;">
  <h1 style="margin-bottom:20px;">Mira Player</h1>
  
  <video-js id="my-video" class="vjs-default-skin vjs-big-play-centered" controls preload="auto" width="960" height="540"
    data-setup='{}'>

  <script src="https://unpkg.com/video.js/dist/video.min.js"></script>
  <script>
    const player = videojs('my-video');
    console.log('%c[Mira Player] Player inicializado com sucesso', 'color:#E50914');
  </script>
</body>
</html>
